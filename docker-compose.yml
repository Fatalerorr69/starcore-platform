version: "3.9"
services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      STARCORE_DATABASE_URL: sqlite:////data/starcore.db
    volumes:
      - starcore-data:/data

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: starcore
      POSTGRES_PASSWORD: starcore
      POSTGRES_DB: starcore
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8
    restart: unless-stopped
    ports:
      - "6379:6379"

  nats:
    image: nats:latest
    restart: unless-stopped
    ports:
      - "4222:4222"

volumes:
  postgres-data:
  starcore-data:
