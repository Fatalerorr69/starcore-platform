name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Pyright
        run: uv run pyright

      - name: pip-audit (dependency vulnerability scan)
        run: uv run pip-audit

      - name: Pytest
        run: uv run pytest -q --cov --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build image
        run: docker build -t starcore-platform:ci-test .

      - name: Smoke test container starts and responds to /health
        run: |
          docker run -d --name starcore-ci -p 8000:8000 \
            -e STARCORE_DATABASE_URL=sqlite:////data/starcore.db \
            starcore-platform:ci-test
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo "Health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after retries"
          docker logs starcore-ci
          exit 1

      - name: Container logs (always, for debugging)
        if: always()
        run: docker logs starcore-ci || true
